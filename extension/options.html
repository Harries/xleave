<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XLeave AI 助手设置</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <main>
      <h1>XLeave AI 助手</h1>
      <p class="intro">插件只需填写访问令牌。语言、字数、上下文、AI Token 和提示词等全部在<a id="account-link" href="#" target="_blank" rel="noreferrer">用户中心</a>统一设置。</p>

      <form id="settings-form">
        <label>
          访问令牌
          <input
            id="apiToken"
            name="apiToken"
            type="password"
            autocomplete="off"
            spellcheck="false"
            required
            placeholder="在用户中心注册后获取的访问 Token"
          />
          <small>令牌只保存在当前浏览器本地，不会通过 Chrome 同步。可在用户中心自助轮换。</small>
        </label>

        <div class="actions">
          <button type="submit">保存令牌</button>
          <span id="status" role="status"></span>
        </div>
      </form>

      <p class="intro">
        还没有账号或需要修改生成偏好？
        <a id="account-link-2" href="#" target="_blank" rel="noreferrer">打开用户中心 →</a>
      </p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
