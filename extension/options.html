<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>X AI Reply Assistant 设置</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <main>
      <h1>X AI Reply Assistant</h1>
      <p class="intro">配置回复语言、长度和你的表达风格。API Key 只保存在后端，不会进入插件。</p>

      <form id="settings-form">
        <label>
          后端地址
          <input id="backendUrl" name="backendUrl" type="url" required />
        </label>

        <label>
          回复语言
          <select id="language" name="language">
            <option value="auto">跟随原帖</option>
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁体中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
          </select>
        </label>

        <label>
          最大字符数
          <input id="maxCharacters" name="maxCharacters" type="number" min="30" max="500" />
        </label>

        <label>
          个人表达风格（可选）
          <textarea
            id="persona"
            name="persona"
            rows="4"
            placeholder="例如：我是独立开发者，表达简洁、真诚，不使用夸张营销词。"
          ></textarea>
        </label>

        <label class="checkbox">
          <input id="includeContext" name="includeContext" type="checkbox" />
          生成时包含最多 3 条可见对话上下文
        </label>

        <div class="actions">
          <button type="submit">保存设置</button>
          <span id="status" role="status"></span>
        </div>
      </form>
    </main>
    <script src="options.js"></script>
  </body>
</html>
